<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Utilities – Fix it in Prompt | Laser Studios</title>
<style>
  :root{
    --bg:#0d0d10;--card:#16161c;--line:#26262f;--text:#e8e8ee;--muted:#9a9aa6;
    --accent:#ff3b3b;--accent-soft:rgba(255,59,59,.12);--radius:14px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.65}
  .wrap{max-width:820px;margin:0 auto;padding:30px 22px 96px}
  .langbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:26px}
  .back{color:var(--muted);text-decoration:none;font-size:14px;font-weight:600}
  .back:hover{color:var(--accent)}
  .switch{display:inline-flex;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:4px;gap:4px}
  .switch button{border:0;background:transparent;color:var(--muted);font-weight:700;font-size:13px;
    letter-spacing:.04em;padding:7px 16px;border-radius:999px;cursor:pointer;transition:all .15s ease}
  .switch button.active{background:var(--accent);color:#fff}
  .kicker{display:inline-block;font-size:13px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--accent);font-weight:700;margin-bottom:14px}
  h1{font-size:44px;line-height:1.1;margin:0 0 16px;font-weight:800;letter-spacing:-.02em}
  .lead{font-size:18px;color:var(--muted);margin:0 0 40px;max-width:620px}
  .grid{display:grid;gap:16px}
  div.card{display:flex;gap:18px;align-items:flex-start;color:inherit;opacity:.65;
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px 24px}
  .no{flex:0 0 auto;width:46px;height:46px;border-radius:12px;background:var(--accent-soft);
    color:var(--accent);font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center}
  .card h2{margin:2px 0 5px;font-size:19px;font-weight:700}
  .card p{margin:0;color:var(--muted);font-size:15px}
  .soon-tag{margin-left:auto;align-self:center;font-size:11px;font-weight:700;letter-spacing:.08em;
    color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:5px 12px;text-transform:uppercase;white-space:nowrap}
  .footer{color:var(--muted);font-size:13px;margin-top:48px;text-align:center}
  .footer a{color:inherit;text-decoration:underline;text-underline-offset:2px}
</style>
</head>
<body>
<div class="wrap">

  <div class="langbar">
    <a class="back" id="t-back" href="fix-it-in-prompt.html">← Fix it in Prompt</a>
    <div class="switch" role="group" aria-label="Language">
      <button id="btn-de" class="active" onclick="setLang('de')">DE</button>
      <button id="btn-en" onclick="setLang('en')">EN</button>
    </div>
  </div>

  <span class="kicker" id="t-kicker">Fix it in Prompt</span>
  <h1 id="t-h1">Smart Utilities</h1>
  <p class="lead" id="t-lead">Kleine Helfer mit großem Effekt – Workflows, die wiederkehrende Aufgaben abnehmen.</p>

  <div class="grid">
    <div class="card">
      <span class="no">SU</span>
      <div><h2 id="t-c1-h">Tutorials in Arbeit</h2><p id="t-c1-p">Die ersten Workflows für diesen Bereich entstehen gerade.</p></div>
      <span class="soon-tag" id="t-soon">Bald</span>
    </div>
  </div>

  <p class="footer">Laser Studios · Fix it in Prompt · <a href="https://laser-studios.de/contact-form">Kontakt</a> · <a href="https://laser-studios.de/impressum">Impressum</a></p>

</div>

<script>
const STR = {
  "t-back":  {de:"← Fix it in Prompt", en:"← Fix it in Prompt"},
  "t-kicker":{de:"Fix it in Prompt", en:"Fix it in Prompt"},
  "t-h1":    {de:"Smart Utilities", en:"Smart Utilities"},
  "t-lead":  {de:"Kleine Helfer mit großem Effekt – Workflows, die wiederkehrende Aufgaben abnehmen.",
              en:"Small helpers with a big impact – workflows that take recurring tasks off your hands."},
  "t-c1-h":  {de:"Tutorials in Arbeit", en:"Tutorials in progress"},
  "t-c1-p":  {de:"Die ersten Workflows für diesen Bereich entstehen gerade.",
              en:"The first workflows for this section are in the works."},
  "t-soon":  {de:"Bald", en:"Soon"}
};
function setLang(lang){
  for(const id in STR){const el=document.getElementById(id);if(el) el.innerHTML=STR[id][lang];}
  document.documentElement.lang=lang;
  document.getElementById('btn-de').classList.toggle('active',lang==='de');
  document.getElementById('btn-en').classList.toggle('active',lang==='en');
}
</script>
<script src="lang.js"></script>
</body>
</html>
